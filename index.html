<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>吹奏楽部 出欠管理</title>
<style>
  :root {
    --mint:       #3ecfb2;
    --mint-light: #d4f5ee;
    --mint-mid:   #7de0cc;
    --sky:        #e8f8f5;
    --navy:       #1a3a4c;
    --slate:      #4a6b7a;
    --white:      #ffffff;
    --gray-100:   #f4f8f9;
    --gray-200:   #dce8ed;
    --gray-400:   #9bb0bb;
    --danger:     #f25c69;
    --warn:       #f8a435;
    --success:    #2ecc8e;
    --info:       #4fa3d4;
    --radius:     14px;
    --shadow:     0 4px 20px rgba(30,80,100,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', sans-serif;
    background: linear-gradient(155deg, #e8f8f5 0%, #d0f0e8 40%, #c8eaf7 100%);
    min-height: 100vh;
    color: var(--navy);
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(100deg, #1a3a4c 0%, #215068 60%, #1e6a7a 100%);
    color: #fff;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 3px 16px rgba(0,0,0,.25);
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 2rem; line-height: 1; }
  header .title-block h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .03em; }
  header .title-block p  { font-size: .75rem; color: var(--mint-mid); margin-top: 2px; }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: var(--navy);
    padding: 0 16px;
    gap: 4px;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 12px 18px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,.55);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: color .2s, border-color .2s;
  }
  .tab-btn.active {
    color: var(--mint);
    border-bottom-color: var(--mint);
  }

  /* ===== MAIN ===== */
  main { max-width: 700px; margin: 0 auto; padding: 16px 12px 24px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ===== CARD ===== */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--slate);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 1.25rem; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: transform .13s, opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary   { background: var(--mint);    color: #fff; }
  .btn-secondary { background: var(--gray-200); color: var(--slate); }
  .btn-danger    { background: var(--danger);   color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: .85rem; border-radius: 8px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ===== FILE INPUT ===== */
  .file-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border: 2px dashed var(--mint);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--slate);
    font-size: .95rem;
    background: var(--sky);
    transition: background .2s;
  }
  .file-label:hover { background: var(--mint-light); }
  .file-label input { display: none; }

  /* ===== DATE PICKER ===== */
  .date-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .date-bar input[type="date"] {
    flex: 1;
    min-width: 160px;
    padding: 12px 14px;
    font-size: 1.1rem;
    border: 2px solid var(--gray-200);
    border-radius: 10px;
    background: var(--gray-100);
    color: var(--navy);
    font-family: inherit;
  }
  .date-bar input[type="date"]:focus {
    outline: none;
    border-color: var(--mint);
  }

  /* ===== SORT BAR ===== */
  .sort-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .sort-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid var(--gray-200);
    background: var(--gray-100);
    color: var(--slate);
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .18s;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-btn.active {
    background: var(--mint);
    border-color: var(--mint);
    color: #fff;
  }

  /* ===== MEMBER ROWS ===== */
  .member-list { display: flex; flex-direction: column; gap: 10px; }

  .member-row {
    background: var(--gray-100);
    border-radius: 12px;
    padding: 14px 14px 14px 16px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    border-left: 4px solid var(--gray-200);
    transition: border-color .2s;
  }
  .member-row.status-出席  { border-left-color: var(--success); }
  .member-row.status-欠席  { border-left-color: var(--danger);  }
  .member-row.status-遅刻  { border-left-color: var(--warn);    }
  .member-row.status-早退  { border-left-color: var(--info);    }

  .member-info { flex: 1; min-width: 120px; }
  .member-name { font-weight: 700; font-size: 1.05rem; color: var(--navy); }
  .member-sub  { font-size: .78rem; color: var(--gray-400); margin-top: 2px; }

  .status-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .status-btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: 2px solid var(--gray-200);
    background: #fff;
    font-size: .82rem;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
    min-width: 54px;
    text-align: center;
  }
  .status-btn:active { transform: scale(.94); }
  .status-btn[data-s="出席"].selected { background: var(--success); border-color: var(--success); color: #fff; }
  .status-btn[data-s="欠席"].selected { background: var(--danger);  border-color: var(--danger);  color: #fff; }
  .status-btn[data-s="遅刻"].selected { background: var(--warn);    border-color: var(--warn);    color: #fff; }
  .status-btn[data-s="早退"].selected { background: var(--info);    border-color: var(--info);    color: #fff; }

  /* ===== INSTRUMENT GROUP HEADER ===== */
  .group-header {
    font-size: .82rem;
    font-weight: 700;
    color: var(--mint);
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 4px 0 4px 4px;
    border-bottom: 1px solid var(--mint-light);
    margin-top: 6px;
  }



  /* ===== RANKING ===== */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    text-align: left;
    font-size: .8rem;
    color: var(--gray-400);
    font-weight: 600;
    padding: 6px 10px;
    border-bottom: 2px solid var(--gray-200);
  }
  .rank-table td {
    padding: 12px 10px;
    font-size: .95rem;
    border-bottom: 1px solid var(--gray-100);
    vertical-align: middle;
  }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-num {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gray-400);
    min-width: 32px;
    display: inline-block;
    text-align: center;
  }
  .rank-num.top1 { color: #e5a000; }
  .rank-num.top2 { color: #888; }
  .rank-num.top3 { color: #8b5e3c; }

  .rate-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rate-bar {
    flex: 1;
    height: 8px;
    background: var(--gray-200);
    border-radius: 4px;
    overflow: hidden;
    min-width: 60px;
  }
  .rate-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--mint), var(--danger));
    transition: width .5s ease;
  }
  .rate-pct {
    font-weight: 700;
    font-size: .9rem;
    min-width: 40px;
    text-align: right;
    color: var(--navy);
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy);
    color: #fff;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: .95rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
    color: var(--gray-400);
    font-size: .95rem;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--mint);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
  }
  .empty .emoji { font-size: 2.5rem; margin-bottom: 10px; }
  .empty p { font-size: .95rem; line-height: 1.6; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    header .title-block h1 { font-size: 1.1rem; }
    .status-btn { padding: 9px 10px; font-size: .8rem; min-width: 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>吹奏楽部 出欠管理</h1>
    <p>Wind Band Attendance System</p>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="attendance">📋 出欠入力</button>
  <button class="tab-btn"        data-tab="ranking">📊 欠席率ランキング</button>
  <button class="tab-btn"        data-tab="import">📂 名簿インポート</button>
</div>

<main>
  <!-- ===== 出欠入力パネル ===== -->
  <div id="panel-attendance" class="panel active">
    <div class="card">
      <div class="card-title"><span class="icon">📅</span>日付を選んで出欠を記録</div>
      <div class="date-bar">
        <input type="date" id="date-picker" />
        <button class="btn btn-secondary btn-sm" id="btn-today">今日</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🎵</span>部員一覧</div>
      <div class="sort-bar">
        <button class="sort-btn active" data-sort="number">出席番号順</button>
        <button class="sort-btn"       data-sort="instrument">楽器順</button>
      </div>
      <div id="member-list-wrap">
        <div class="loading"><div class="spinner"></div>読み込み中…</div>
      </div>
    </div>
  </div>

  <!-- ===== 欠席率ランキングパネル ===== -->
  <div id="panel-ranking" class="panel">
    <div class="card">
      <div class="card-title"><span class="icon">📊</span>欠席率ランキング（高い順）</div>
      <div id="ranking-wrap">
        <div class="loading"><div class="spinner"></div>集計中…</div>
      </div>
    </div>
  </div>

  <!-- ===== 名簿インポートパネル ===== -->
  <div id="panel-import" class="panel">
    <div class="card">
      <div class="card-title"><span class="icon">📂</span>CSVファイルから名簿を読み込む</div>
      <p style="font-size:.88rem;color:var(--slate);margin-bottom:14px;line-height:1.6;">
        列構成：<strong>出席番号, 名前, 担当楽器</strong>（1行目は見出し）<br>
        スプレッドシートからCSVとして書き出してください。
      </p>
      <label class="file-label">
        <span style="font-size:1.5rem;">📄</span>
        <span>CSVファイルを選択する</span>
        <input type="file" id="csv-file" accept=".csv,text/csv" />
      </label>
      <div id="csv-preview" style="margin-top:14px;"></div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-import" disabled>Firestoreに保存する</button>
      </div>
    </div>
    <div class="card" id="member-list-card">
      <div class="card-title"><span class="icon">👥</span>現在登録されている部員</div>
      <div id="registered-members">
        <div class="loading"><div class="spinner"></div>読み込み中…</div>
      </div>
    </div>
  </div>
</main>

<!-- トースト -->
<div id="toast"></div>

<script type="module">
// =============================================
// Firebase 初期化
// =============================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc,
  collection, getDocs, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAcEjNyngjasdoztwITyakYqQHXWwd-dGU",
  authDomain:        "syukketu-f5fae.firebaseapp.com",
  projectId:         "syukketu-f5fae",
  storageBucket:     "syukketu-f5fae.firebasestorage.app",
  messagingSenderId: "645948167515",
  appId:             "1:645948167515:web:28c9c0d051dbc43fd2367e"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const PASS = 'ongakudo';

// =============================================
// ユーティリティ
// =============================================
function showToast(msg, duration = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// =============================================
// 状態
// =============================================
let members     = [];   // [{number, name, instrument}]
let attendance  = {};   // {memberId: status}
let currentDate = todayStr();
let sortMode    = 'number';
let csvRows     = [];   // インポート用

// =============================================
// タブ切り替え
// =============================================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(`panel-${tab}`).classList.add('active');
    if (tab === 'ranking') loadRanking();
    if (tab === 'import')  loadRegisteredMembers();
  });
});

// =============================================
// 日付ピッカー
// =============================================
const datePicker = document.getElementById('date-picker');
datePicker.value = currentDate;
datePicker.addEventListener('change', async () => {
  currentDate = datePicker.value;
  await loadAttendance();
  renderMemberList();
});
document.getElementById('btn-today').addEventListener('click', async () => {
  currentDate = todayStr();
  datePicker.value = currentDate;
  await loadAttendance();
  renderMemberList();
});

// =============================================
// ソート切り替え
// =============================================
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    renderMemberList();
  });
});

// =============================================
// Firestore: 部員一覧を読み込む
// =============================================
async function loadMembers() {
  try {
    const snap = await getDocs(collection(db, 'members'));
    members = [];
    snap.forEach(d => members.push({ id: d.id, ...d.data() }));
    // 出席番号でデフォルトソート
    members.sort((a, b) => Number(a.number) - Number(b.number));
  } catch (e) {
    console.error('部員読み込みエラー', e);
    showToast('⚠️ 部員データの読み込みに失敗しました');
  }
}

// =============================================
// Firestore: 指定日の出欠を読み込む
// =============================================
async function loadAttendance() {
  attendance = {};
  if (!currentDate) return;
  try {
    const ref  = doc(db, 'attendance', currentDate);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      Object.keys(data).forEach(key => {
        if (key !== 'pass') attendance[key] = data[key];
      });
    }
  } catch (e) {
    console.error('出欠読み込みエラー', e);
  }
}

// =============================================
// 部員一覧レンダリング
// =============================================
function getSortedMembers() {
  if (sortMode === 'number') {
    return [...members].sort((a, b) => Number(a.number) - Number(b.number));
  } else {
    return [...members].sort((a, b) => {
      const ia = (a.instrument || '').localeCompare(b.instrument || '', 'ja');
      if (ia !== 0) return ia;
      return Number(a.number) - Number(b.number);
    });
  }
}

function renderMemberList() {
  const wrap = document.getElementById('member-list-wrap');
  const sorted = getSortedMembers();

  if (sorted.length === 0) {
    wrap.innerHTML = `<div class="empty">
      <div class="emoji">🎸</div>
      <p>まだ部員が登録されていません。<br>「名簿インポート」タブからCSVを読み込んでください。</p>
    </div>`;
    return;
  }

  let html = '<div class="member-list">';

  if (sortMode === 'instrument') {
    // 楽器グループ
    const groups = {};
    sorted.forEach(m => {
      const key = m.instrument || '未設定';
      if (!groups[key]) groups[key] = [];
      groups[key].push(m);
    });
    Object.keys(groups).sort((a, b) => a.localeCompare(b, 'ja')).forEach(inst => {
      html += `<div class="group-header">🎵 ${inst}</div>`;
      groups[inst].forEach(m => { html += memberRowHTML(m); });
    });
  } else {
    sorted.forEach(m => { html += memberRowHTML(m); });
  }

  html += '</div>';
  wrap.innerHTML = html;

  // ステータスボタンのイベント（タップで即自動保存）
  wrap.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const memberId = btn.dataset.id;
      const status   = btn.dataset.s;
      attendance[memberId] = status;

      // ボタン見た目更新
      const row = btn.closest('.member-row');
      row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      // 行の色クラス更新
      row.className = `member-row status-${status}`;

      // 自動保存
      await autoSave();
    });
  });
}

function memberRowHTML(m) {
  const s = attendance[m.id] || '';
  const statuses = ['出席', '欠席', '遅刻', '早退'];
  const btns = statuses.map(st =>
    `<button class="status-btn${s === st ? ' selected' : ''}" data-s="${st}" data-id="${m.id}">${st}</button>`
  ).join('');
  return `
    <div class="member-row${s ? ' status-' + s : ''}" data-id="${m.id}">
      <div class="member-info">
        <div class="member-name">${escHtml(m.name || '')}</div>
        <div class="member-sub">No.${escHtml(String(m.number || ''))}　${escHtml(m.instrument || '')}</div>
      </div>
      <div class="status-btns">${btns}</div>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =============================================
// 自動保存
// =============================================
let saveTimer = null;
async function autoSave() {
  if (!currentDate) return;
  // 連打対策：直前のタイマーをキャンセルして300ms後に保存
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const payload = { pass: PASS };
      Object.keys(attendance).forEach(id => { payload[id] = attendance[id]; });
      await setDoc(doc(db, 'attendance', currentDate), payload);
      showToast('✅ 保存しました');
    } catch (e) {
      console.error('自動保存エラー', e);
      showToast('❌ 保存に失敗しました: ' + e.message);
    }
  }, 300);
}

// =============================================
// 欠席率ランキング
// =============================================
async function loadRanking() {
  const wrap = document.getElementById('ranking-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>集計中…</div>';

  try {
    // 全出欠データ取得
    const attSnap = await getDocs(collection(db, 'attendance'));
    // {memberId: {total, absent}}
    const stats = {};
    members.forEach(m => { stats[m.id] = { total: 0, absent: 0 }; });

    attSnap.forEach(d => {
      const data = d.data();
      Object.keys(data).forEach(key => {
        if (key === 'pass') return;
        if (!stats[key]) stats[key] = { total: 0, absent: 0 };
        stats[key].total++;
        if (data[key] === '欠席') stats[key].absent++;
      });
    });

    // 部員名マップ
    const nameMap = {};
    const instrMap = {};
    members.forEach(m => { nameMap[m.id] = m.name; instrMap[m.id] = m.instrument; });

    // ランキング配列
    const ranking = Object.keys(stats)
      .filter(id => stats[id].total > 0)
      .map(id => ({
        id,
        name:       nameMap[id] || id,
        instrument: instrMap[id] || '',
        total:      stats[id].total,
        absent:     stats[id].absent,
        rate:       stats[id].total > 0 ? stats[id].absent / stats[id].total : 0
      }))
      .sort((a, b) => b.rate - a.rate || b.absent - a.absent);

    if (ranking.length === 0) {
      wrap.innerHTML = `<div class="empty">
        <div class="emoji">📊</div>
        <p>まだ出欠データがありません。<br>「出欠入力」タブで記録を始めましょう！</p>
      </div>`;
      return;
    }

    let html = `<table class="rank-table">
      <thead><tr>
        <th>順位</th>
        <th>名前</th>
        <th>欠席率</th>
        <th style="text-align:right;">欠席/記録</th>
      </tr></thead><tbody>`;

    ranking.forEach((r, i) => {
      const rank = i + 1;
      const numClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
      const pct = (r.rate * 100).toFixed(1);
      const fillW = Math.round(r.rate * 100);
      html += `<tr>
        <td><span class="rank-num ${numClass}">${rank}</span></td>
        <td>
          <div style="font-weight:700;">${escHtml(r.name)}</div>
          <div style="font-size:.75rem;color:var(--gray-400);">${escHtml(r.instrument)}</div>
        </td>
        <td style="min-width:120px;">
          <div class="rate-bar-wrap">
            <div class="rate-bar"><div class="rate-fill" style="width:${fillW}%;"></div></div>
            <span class="rate-pct">${pct}%</span>
          </div>
        </td>
        <td style="text-align:right;font-size:.88rem;color:var(--slate);">${r.absent}/${r.total}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  } catch (e) {
    console.error('ランキングエラー', e);
    wrap.innerHTML = `<div class="empty"><div class="emoji">⚠️</div><p>データ取得に失敗しました。<br>${escHtml(e.message)}</p></div>`;
  }
}

// =============================================
// CSVインポート
// =============================================
document.getElementById('csv-file').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    parseCsv(text);
  };
  reader.readAsText(file, 'UTF-8');
});

function parseCsv(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) {
    showToast('⚠️ データが少なすぎます（見出し＋1行以上必要）');
    return;
  }
  // 1行目はヘッダーとして読み飛ばす
  csvRows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    if (cols.length < 2) continue;
    csvRows.push({
      number:     cols[0] || '',
      name:       cols[1] || '',
      instrument: cols[2] || ''
    });
  }

  if (csvRows.length === 0) {
    showToast('⚠️ 有効なデータが見つかりませんでした');
    document.getElementById('btn-import').disabled = true;
    return;
  }

  // プレビュー
  let html = `<p style="font-size:.85rem;color:var(--slate);margin-bottom:8px;">${csvRows.length}名のデータを検出しました：</p>`;
  html += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.85rem;">';
  html += '<tr style="background:var(--gray-100);"><th style="padding:6px 8px;text-align:left;">番号</th><th style="padding:6px 8px;text-align:left;">名前</th><th style="padding:6px 8px;text-align:left;">楽器</th></tr>';
  csvRows.slice(0, 10).forEach(r => {
    html += `<tr style="border-bottom:1px solid var(--gray-200);">
      <td style="padding:6px 8px;">${escHtml(r.number)}</td>
      <td style="padding:6px 8px;">${escHtml(r.name)}</td>
      <td style="padding:6px 8px;">${escHtml(r.instrument)}</td>
    </tr>`;
  });
  if (csvRows.length > 10) {
    html += `<tr><td colspan="3" style="padding:6px 8px;color:var(--gray-400);">…他 ${csvRows.length - 10} 名</td></tr>`;
  }
  html += '</table></div>';
  document.getElementById('csv-preview').innerHTML = html;
  document.getElementById('btn-import').disabled = false;
}

document.getElementById('btn-import').addEventListener('click', async () => {
  if (!csvRows.length) return;
  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  btn.textContent = '保存中…';

  try {
    // バッチで保存（500件制限につき分割）
    const CHUNK = 400;
    for (let i = 0; i < csvRows.length; i += CHUNK) {
      const batch = writeBatch(db);
      csvRows.slice(i, i + CHUNK).forEach(row => {
        // IDは出席番号_名前のハッシュ代わりに安全文字列で
        const id = `m_${String(row.number).replace(/\s/g,'')}_${row.name.replace(/\s/g,'').slice(0,10)}`;
        const ref = doc(db, 'members', id);
        batch.set(ref, {
          number:     row.number,
          name:       row.name,
          instrument: row.instrument,
          pass:       PASS
        });
      });
      await batch.commit();
    }

    showToast(`✅ ${csvRows.length}名の名簿を保存しました！`);
    csvRows = [];
    document.getElementById('csv-preview').innerHTML = '';
    document.getElementById('csv-file').value = '';
    // 部員データ再読み込み
    await loadMembers();
    await loadRegisteredMembers();
    renderMemberList();
  } catch (e) {
    console.error('インポートエラー', e);
    showToast('❌ 保存に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Firestoreに保存する';
  }
});

// =============================================
// 登録済み部員表示（インポートタブ）
// =============================================
async function loadRegisteredMembers() {
  const wrap = document.getElementById('registered-members');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中…</div>';
  await loadMembers();

  if (members.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="emoji">👥</div><p>まだ部員が登録されていません。</p></div>`;
    return;
  }

  let html = `<p style="font-size:.85rem;color:var(--slate);margin-bottom:10px;">合計 ${members.length} 名が登録されています</p>`;
  html += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.88rem;">';
  html += '<tr style="background:var(--gray-100);"><th style="padding:8px 10px;text-align:left;">番号</th><th style="padding:8px 10px;text-align:left;">名前</th><th style="padding:8px 10px;text-align:left;">楽器</th></tr>';
  members.forEach(m => {
    html += `<tr style="border-bottom:1px solid var(--gray-200);">
      <td style="padding:8px 10px;">${escHtml(String(m.number || ''))}</td>
      <td style="padding:8px 10px;font-weight:600;">${escHtml(m.name || '')}</td>
      <td style="padding:8px 10px;">${escHtml(m.instrument || '')}</td>
    </tr>`;
  });
  html += '</table></div>';
  wrap.innerHTML = html;
}

// =============================================
// 初期化
// =============================================
async function init() {
  await loadMembers();
  await loadAttendance();
  renderMemberList();
}

init();
